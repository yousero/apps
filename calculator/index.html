<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="shortcut icon" href="icons8-calculator-96.png" type="image/png">
  <link rel="stylesheet" href="../basic.css">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="main.css">
</head>

<body>
  <main class="main">
    <div class="container">
      <section class="section app-section">
        <header class="app-header"><a href="../">Back</a></header>
        <div class="app-calc">
          <div class="calc-wrapper">
            <div class="calc-display">
              <div id="answer" class="calc-answer"></div>
              <input type="text" name="number" id="number" class="calc-input" />
            </div>
            <div id="keypad">
              <div class="calc-row">
                <button id="btn-ac" class="btn">AC</button>
                <button id="btn-sqrt" class="btn">√</button>
                <button id="btn-more" class="btn">...</button>
                <button id="btn-division" class="btn">÷</button>
              </div>
              <div class="calc-row">
                <button id="btn-7" class="btn">7</button>
                <button id="btn-8" class="btn">8</button>
                <button id="btn-9" class="btn">9</button>
                <button id="btn-multiplication" class="btn">×</button>
              </div>
              <div class="calc-row">
                <button id="btn-4" class="btn">4</button>
                <button id="btn-5" class="btn">5</button>
                <button id="btn-6" class="btn">6</button>
                <button id="btn-minus" class="btn">−</button>
              </div>
              <div class="calc-row">
                <button id="btn-1" class="btn">1</button>
                <button id="btn-2" class="btn">2</button>
                <button id="btn-3" class="btn">3</button>
                <button id="btn-addition" class="btn">+</button>
              </div>
              <div class="calc-row">
                <button id="btn-0" class="btn">0</button>
                <button id="btn-dot" class="btn">.</button>
                <button id="btn-backspace" class="btn">⌫</button>
                <button id="btn-equals" class="btn">=</button>
              </div>
            </div>
            <div id="keypad-extend" class="hidden">
              <div class="calc-row">
                <button id="btn-back" class="btn">↩</button>
                <button id="btn-sin" class="btn">sin</button>
                <button id="btn-cos" class="btn">cos</button>
                <button id="btn-tan" class="btn">tan</button>
              </div>
              <div class="calc-row">
                <button id="btn-" class="btn">^</button>
                <button id="btn-factorial" class="btn">!</button>
                <button id="btn-log" class="btn">log</button>
                <button id="btn-ln" class="btn">ln</button>
              </div>
              <div class="calc-row">
                <button id="btn-pi" class="btn">π</button>
                <button id="btn-e" class="btn">e</button>
                <button id="btn-degrad" class="btn">DEG</button>
                <button id="btn-rnd" class="btn">RND</button>
              </div>
              <div class="calc-row invisible">
                <button class="btn"></button>
                <button class="btn"></button>
                <button class="btn"></button>
                <button class="btn"></button>
              </div>
              <div class="calc-row invisible">
                <button class="btn"></button>
                <button class="btn"></button>
                <button class="btn"></button>
                <button class="btn"></button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="main.js"></script>
</body>

</html>
